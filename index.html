
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MealMan" />

    <title>MealMan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" integrity="sha512-r6rDA7W6ZeQhvl8S7yRVQUKVHdexq+GClBdKgDBL2ooqv//7VSTduiVvIVGkBI58KU0971CHSop9ArOBlhtmlA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
      
      * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
        touch-action: manipulation;
      }

      body {
        background-color: #020617;
        color: #E2E8F0;
        font-family: 'Inter', sans-serif;
        overscroll-behavior-y: none;
        overflow: hidden;
        margin: 0;
        padding: 0;
      }

      /* Native-like loader to show BEFORE React mounts */
      .app-loader {
        position: fixed;
        inset: 0;
        background: #020617;
        display: flex;
        flex-col: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loader-ring {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 215, 0, 0.1);
        border-top: 4px solid #FFD700;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      .loader-text {
        font-family: 'Inter', sans-serif;
        color: #FFD700;
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 700;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
</head>
  <body>
    <!-- Immediate Feedback Loader (Replaced by React on mount) -->
    <div id="root">
      <div class="app-loader">
        <div class="loader-ring"></div>
        <div class="loader-text">Initializing System...</div>
      </div>
    </div>
    
    <script>
      // Force unregister any existing service workers immediately
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          } 
        }).catch(err => console.log('SW Cleanup error (harmless):', err));
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
